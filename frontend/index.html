<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LSAF Air Force</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1928 0%, #1a2a4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Logos flotantes decorativos */
        .bg-logos {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
        }
        
        .bg-logos img {
            width: 100px;
            margin: 10px;
        }
        
        .login-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 450px;
            padding: 40px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease;
            z-index: 10;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header img {
            max-width: 80px;
            margin-bottom: 15px;
        }
        
        .login-header h1 {
            color: #1a2a4f;
            font-size: 28px;
        }
        
        .login-header p {
            color: #6c757d;
            margin-top: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #4a7db5;
            box-shadow: 0 0 0 3px rgba(74,125,181,0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1a2a4f 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        
        .info-test {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            color: #1a2a4f;
        }
        
        .info-test p {
            margin: 5px 0;
        }
        
        .logos-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .logos-footer img {
            height: 30px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
    <img src="" alt="Logo" id="logoPrincipal">
    <h1 id="orgNombre"></h1>
    <p id="orgSubtitulo"></p>
</div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="correo@airforce.mil">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Contraseña</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        
        <button onclick="iniciarSesion()">
            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="info-test">
            <strong><i class="fas fa-flask"></i> Datos de prueba:</strong>
            <p><i class="fas fa-envelope"></i> carlos.perez@airforce.mil</p>
            <p><i class="fas fa-key"></i> Contraseña: 123456</p>
        </div>
        
        <div class="logos-footer">
            <img src="img/airforce.png" alt="Air Force">
            <img src="img/aetc.png" alt="AETC" >
        </div>
    </div>
    
    <div class="bg-logos">
        <img src="img/lsaf.png" alt="">
    </div>

    <!-- MODAL DE SESIÓN EXPIRADA -->
<div id="modalSesionExpirada" class="modal" style="display: none; z-index: 10000;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div class="modal-header">
            <h2><i class="fas fa-exclamation-triangle" style="color: #ffc107;"></i> Sesión Caducada</h2>
        </div>
        <div style="padding: 20px;">
            <p>Tu cuenta ha sido desactivada o tu rol ha sido modificado por un administrador.</p>
            <p>Debes <strong>volver a iniciar sesión</strong> para continuar.</p>
            <p style="font-size: 12px; color: #999; margin-top: 15px;">Esta acción es obligatoria.</p>
        </div>
        <button id="btnCerrarSesionForzada" class="btn-guardar" style="background: #dc3545;">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>
</div>
<script src="js/config.js">

    // Cargar configuración
document.getElementById('logoPrincipal').src = ORG_CONFIG.logos.principal;
document.getElementById('orgNombre').textContent = ORG_CONFIG.nombre;
document.getElementById('orgSubtitulo').textContent = ORG_CONFIG.textos.sistema;
</script>
    
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'pilotos.html';
        }
        
        async function iniciarSesion() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    
    if (!email || !password) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Por favor, completa todos los campos';
        return;
    }
    
    errorDiv.style.display = 'none';
    
    try {
        const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('piloto', JSON.stringify(data.piloto));
            
            if (data.piloto.rol === 'Admin' || data.piloto.rol === 'Supervisor') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'pilotos.html';
            }
        } else {
            let mensaje = data.mensaje || 'Error al iniciar sesión';
            
            // Mensaje personalizado para usuario archivado
            if (data.error === 'Usuario archivado') {
                mensaje = '❌ Su cuenta ha sido desactivada. Ya no pertenece a la Fuerza Aérea de LSAF. Contacte con un administrador.';
            }
            
            errorDiv.style.display = 'block';
            errorDiv.textContent = mensaje;
        }
    } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Error de conexión. ¿El servidor está corriendo?';
        console.error('Error:', error);
    }
}
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                iniciarSesion();
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById('logoPrincipal')) {
        document.getElementById('logoPrincipal').src = ORG_CONFIG.logos.principal;
        document.getElementById('orgNombre').textContent = ORG_CONFIG.nombre;
        document.getElementById('orgSubtitulo').textContent = ORG_CONFIG.textos.sistema;
    }
});
    </script>
</body>
</html>
